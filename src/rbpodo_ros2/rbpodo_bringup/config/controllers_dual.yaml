controller_manager:
  ros__parameters:
    update_rate: 100

    joint_state_broadcaster:
      type: joint_state_broadcaster/JointStateBroadcaster

    rb3_1_joint_trajectory_controller:
      type: joint_trajectory_controller/JointTrajectoryController

    rb3_2_joint_trajectory_controller:
      type: joint_trajectory_controller/JointTrajectoryController


rb3_1_joint_trajectory_controller:
  ros__parameters:
    joints:
      - rb3_1_base
      - rb3_1_shoulder
      - rb3_1_elbow
      - rb3_1_wrist1
      - rb3_1_wrist2
      - rb3_1_wrist3

    command_interfaces:
      - position

    state_interfaces:
      - position

    action_monitor_rate: 20.0
    allow_partial_joints_goal: false
    open_loop_control: true
    constraints:
      stopped_velocity_tolerance: 0.01
      goal_time: 0.0


rb3_2_joint_trajectory_controller:
  ros__parameters:
    joints:
      - rb3_2_base
      - rb3_2_shoulder
      - rb3_2_elbow
      - rb3_2_wrist1
      - rb3_2_wrist2
      - rb3_2_wrist3

    command_interfaces:
      - position

    state_interfaces:
      - position

    action_monitor_rate: 20.0
    allow_partial_joints_goal: false
    open_loop_control: true
    constraints:
      stopped_velocity_tolerance: 0.01
      goal_time: 0.0
